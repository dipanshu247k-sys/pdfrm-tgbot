name: Run Telegram PDF Bot

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 9
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start local Telegram Bot API server (Docker)
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
        run: |
          set -euo pipefail
          docker pull ghcr.io/jakbin/telegram-bot-api-binary:main
          docker run -d --name telegram-bot-api \
            -p 8081:8081 \
            -e API_ID="$API_ID" \
            -e API_HASH="$API_HASH" \
            ghcr.io/jakbin/telegram-bot-api-binary:main
          for i in {1..30}; do
            if curl -s http://localhost:8081 >/dev/null; then
              echo "telegram-bot-api is up"
              exit 0
            fi
            sleep 1
          done
          echo "telegram-bot-api failed to start"
          docker logs telegram-bot-api || true
          exit 1

      - name: Run bot once
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          python bot.py --token "$BOT_TOKEN"
